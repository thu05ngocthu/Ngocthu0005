<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人專業檔案 | LinkedIn Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gray: #f3f2ef;
            --link-blue: #0a66c2;
            --link-hover: #004182;
            --text-main: rgba(0,0,0,0.9);
            --text-sub: rgba(0,0,0,0.6);
            --border-color: #e0e0e0;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-gray);
            font-family: 'Noto Sans TC', -apple-system, system-ui, sans-serif;
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 50px;
        }

        /* 導覽列 */
        nav {
            background-color: var(--white);
            height: 52px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1128px;
            margin: 0 auto;
            width: 95%;
        }

        /* 主卡片區域 */
        .profile-card {
            background: var(--white);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-top: 24px;
            overflow: hidden;
            position: relative;
        }

        /* 背景橫幅 */
        .banner {
            height: 200px;
            background: linear-gradient(135deg, #a0b4b7 0%, #d9e2e1 100%); /* 預設質感漸層 */
        }

        /* 照片區域 */
        .photo-container {
            position: absolute;
            top: 120px;
            left: 24px;
        }

        .profile-photo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid var(--white);
            object-fit: cover;
            background-color: #eee;
        }

        /* 個人基本資料 */
        .profile-info {
            padding: 90px 24px 24px 24px;
        }

        .name {
            font-size: 24px;
            font-weight: 700;
        }

        .headline {
            font-size: 18px;
            color: var(--text-main);
            margin-top: 4px;
        }

        .location {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 8px;
        }

        /* 按鈕組 */
        .btn-group {
            margin-top: 16px;
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background-color: var(--link-blue);
            color: var(--white);
        }

        .btn-primary:hover {
            background-color: var(--link-hover);
        }

        .btn-outline {
            border: 1px solid var(--link-blue);
            color: var(--link-blue);
        }

        .btn-outline:hover {
            background-color: rgba(10, 102, 194, 0.1);
        }

        /* 內容區塊 */
        .section-card {
            background: var(--white);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-top: 12px;
            padding: 24px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .about-text {
            white-space: pre-line;
            color: var(--text-main);
        }

        /* 技能標籤 */
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .tag {
            background: #e8f3fd;
            color: var(--link-blue);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 500;
        }

        /* 響應式微調 */
        @media (max-width: 600px) {
            .banner { height: 120px; }
            .photo-container { top: 60px; left: 50%; transform: translateX(-50%); }
            .profile-info { text-align: center; padding-top: 110px; }
            .btn-group { justify-content: center; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="container">
            <i class="fab fa-linkedin" style="color: var(--link-blue); font-size: 24px;"></i>
        </div>
    </nav>

    <div class="container">
        <section class="profile-card">
            <div class="banner"></div>
            <div class="photo-container">
                <img src="images/abc.jpg" alt="Profile Photo" class="profile-photo">
            </div>
            
            <div class="profile-info">
                <h1 class="name">玉秋</h1>
                <p class="headline">專業職稱 | 核心技術領域 | 一句話個人特色</p>
                <p class="location">台灣，台北市 • <span style="color:var(--link-blue); cursor:pointer;">聯絡方式</span></p>
                
                <div class="btn-group">
                    <a href="mailto:your-email@example.com" class="btn btn-primary">聯絡我</a>
                    <a href="https://github.com" target="_blank" class="btn btn-outline">查看作品集</a>
                </div>
            </div>
        </section>

        <section class="section-card">
            <h2 class="section-title">關於 (About)</h2>
            <p class="about-text">
                這裡可以寫下你的專業背景。例如：我是一位擁有五年經驗的數位行銷專家，專精於數據分析與品牌成長。
                
                我熱衷於解決複雜的問題，並持續學習新技術以提升工作效率。曾協助超過 10 間企業達成業績增長 200% 的紀錄。
            </p>
        </section>

        <section class="section-card">
            <h2 class="section-title">核心技能 (Skills)</h2>
            <div class="skill-tags">
                <span class="tag">專案管理</span>
                <span class="tag">數據分析</span>
                <span class="tag">Python</span>
                <span class="tag">UI/UX 設計</span>
                <span class="tag">品牌策略</span>
                <span class="tag">英文溝通</span>
            </div>
        </section>

        <section class="section-card">
            <h2 class="section-title">更多連結</h2>
            <div style="display: flex; gap: 20px; font-size: 20px;">
                <a href="#" style="color: var(--text-sub);"><i class="fab fa-github"></i></a>
                <a href="#" style="color: var(--text-sub);"><i class="fab fa-instagram"></i></a>
                <a href="#" style="color: var(--text-sub);"><i class="fas fa-envelope"></i></a>
            </div>
        </section>
    </div>

</body>
</html>
